databases:
  - name: gymremo-db
    databaseName: gymremo_db
    plan: free
    region: oregon

services:
  - type: web
    name: gymremo-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: gymremo-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: gymremo-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: gymremo-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://gymremo.vercel.app
      - key: PORT
        value: 8080
