spring.datasource.url=jdbc:postgresql://localhost:5432/gymremo_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

jwt.secret=${JWT_SECRET:gymremo-super-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256-signing}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

cors.allowed-origins=http://localhost:3000,https://gymremo.vercel.app

logging.level.com.gymremo=DEBUG
logging.level.org.springframework.security=DEBUG
