server.port=${PORT:8080}

# Render provides JDBC_DATABASE_URL in correct JDBC format (jdbc:postgresql://host:port/db?user=...&password=...)
# DATABASE_URL is in postgres:// URI format which JDBC does NOT accept directly
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://gymremo.vercel.app}

logging.level.com.gymremo=INFO
